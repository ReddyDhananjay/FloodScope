<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FloodScope — Sign In</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
    background:linear-gradient(135deg,#f0f4f2 0%,#e6f7ee 100%);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  }

  .card{
    width:100%;max-width:420px;background:#fff;border-radius:20px;
    box-shadow:0 20px 60px rgba(0,0,0,.12);overflow:hidden;
  }

  .card-header{
    text-align:center;padding:32px 32px 24px;
  }

  .logo{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:20px}
  .logo .dot{width:12px;height:12px;border-radius:50%;background:#00994d;box-shadow:0 0 10px rgba(0,153,77,.5);animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .logo .name{font-size:24px;font-weight:800;letter-spacing:-.5px;color:#0d1117}
  .logo .accent{color:#00994d}

  .header-title{font-size:22px;font-weight:700;color:#0d1117;margin-bottom:4px}
  .header-sub{font-size:14px;color:#5c6b66}

  /* Tabs */
  .tabs{display:flex;padding:0 32px;gap:0;border-bottom:1px solid #e0e6e3}
  .tab{
    flex:1;padding:12px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;
    color:#5c6b66;border-bottom:2px solid transparent;transition:.2s;background:none;border-left:0;border-right:0;border-top:0;
  }
  .tab.active{color:#00994d;border-bottom-color:#00994d}
  .tab:hover:not(.active){color:#0d1117}

  .form-body{padding:28px 32px 32px}

  /* Google Button */
  .google-btn{
    display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:11px 16px;
    border:1px solid #d0d8d3;border-radius:10px;background:#fff;color:#3c4043;
    font-size:14px;font-weight:600;cursor:pointer;transition:.2s;text-decoration:none;
    font-family:inherit;
  }
  .google-btn:hover{background:#f8faf9;border-color:#b0b8b3;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .google-btn svg{width:18px;height:18px;flex-shrink:0}

  .divider{display:flex;align-items:center;gap:12px;margin:20px 0}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:#e0e6e3}
  .divider span{font-size:12px;color:#8a9690;font-weight:500}

  /* Input fields */
  .input-group{margin-bottom:16px}
  .input-group label{display:block;font-size:12px;font-weight:700;color:#5c6b66;margin-bottom:6px;letter-spacing:.3px}
  .input-group input{
    width:100%;padding:11px 14px;border:1px solid #d0d8d3;border-radius:10px;font-size:14px;
    color:#0d1117;font-family:inherit;transition:.15s;background:#fff;
  }
  .input-group input:focus{outline:none;border-color:#00994d;box-shadow:0 0 0 3px rgba(0,153,77,.1)}

  /* Submit button */
  .submit-btn{
    width:100%;padding:12px;border:0;border-radius:10px;background:#00994d;color:#fff;
    font-size:15px;font-weight:700;cursor:pointer;transition:.2s;font-family:inherit;margin-top:4px;
  }
  .submit-btn:hover{background:#00b85e;box-shadow:0 4px 14px rgba(0,153,77,.3)}
  .submit-btn:active{transform:scale(.98)}
  .submit-btn:disabled{opacity:.5;cursor:wait}

  /* Error message */
  .error-msg{
    background:#fde8ea;border:1px solid #f5b8c0;color:#dc3545;padding:10px 14px;
    border-radius:8px;font-size:13px;margin-bottom:16px;display:none;
  }
  .error-msg.show{display:block;animation:fadeIn .3s}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}

  .footer-text{text-align:center;font-size:13px;color:#5c6b66;margin-top:18px}
  .footer-text a{color:#00994d;font-weight:600;cursor:pointer;text-decoration:none}
  .footer-text a:hover{text-decoration:underline}

  .secure-note{text-align:center;margin-top:16px;font-size:11px;color:#8a9690}
  .secure-note b{color:#00994d}

  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Hidden form */
  .form-section{display:none}
  .form-section.active{display:block;animation:fadeIn .3s}
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="logo"><span class="dot"></span><span class="name">Flood<span class="accent">Scope</span></span></div>
    <div class="header-title" id="formTitle">Welcome back</div>
    <div class="header-sub" id="formSub">Sign in to your account to continue</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="signinTab" onclick="switchTab('signin')">Sign In</button>
    <button class="tab" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
  </div>

  <div class="form-body">

    <!-- Google button (always visible) -->
    <a href="/auth/google" class="google-btn" id="googleBtn">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      <span>Continue with Google</span>
    </a>

    <div class="divider"><span>or use email</span></div>

    <div class="error-msg" id="errorMsg"></div>

    <!-- SIGN IN FORM -->
    <div class="form-section active" id="signinForm">
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="signinEmail" placeholder="you@example.com" />
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="signinPassword" placeholder="Your password" />
      </div>
      <button class="submit-btn" id="signinBtn" onclick="handleSignIn()">Sign In</button>
      <div class="footer-text">
        Don't have an account? <a onclick="switchTab('signup')">Sign up</a>
      </div>
    </div>

    <!-- SIGN UP FORM -->
    <div class="form-section" id="signupForm">
      <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="signupName" placeholder="Your name" />
      </div>
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com" />
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="At least 6 characters" />
      </div>
      <button class="submit-btn" id="signupBtn" onclick="handleSignUp()">Create Account</button>
      <div class="footer-text">
        Already have an account? <a onclick="switchTab('signin')">Sign in</a>
      </div>
    </div>

    <div class="secure-note">
      <b>🔒 Secure</b> — Google 2-step verification supported · Your password is encrypted
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

function showError(msg) {
  const el = $('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 5000);
}

function switchTab(tab) {
  $('errorMsg').classList.remove('show');
  if (tab === 'signin') {
    $('signinTab').classList.add('active');
    $('signupTab').classList.remove('active');
    $('signinForm').classList.add('active');
    $('signupForm').classList.remove('active');
    $('formTitle').textContent = 'Welcome back';
    $('formSub').textContent = 'Sign in to your account to continue';
  } else {
    $('signupTab').classList.add('active');
    $('signinTab').classList.remove('active');
    $('signupForm').classList.add('active');
    $('signinForm').classList.remove('active');
    $('formTitle').textContent = 'Create account';
    $('formSub').textContent = 'Sign up to get started with FloodScope';
  }
}

// Enter key submits
$('signinPassword').addEventListener('keydown', e => { if (e.key === 'Enter') handleSignIn(); });
$('signupPassword').addEventListener('keydown', e => { if (e.key === 'Enter') handleSignUp(); });

async function handleSignIn() {
  const email = $('signinEmail').value.trim();
  const password = $('signinPassword').value;
  if (!email || !password) { showError('Please enter your email and password'); return; }

  const btn = $('signinBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) { throw new Error(data.error || 'Login failed'); }
    window.location.href = '/';
  } catch (err) {
    showError(err.message);
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

async function handleSignUp() {
  const name = $('signupName').value.trim();
  const email = $('signupEmail').value.trim();
  const password = $('signupPassword').value;
  if (!name || !email || !password) { showError('Please fill in all fields'); return; }
  if (password.length < 6) { showError('Password must be at least 6 characters'); return; }

  const btn = $('signupBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  try {
    const res = await fetch('/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password }),
    });
    const data = await res.json();
    if (!res.ok) { throw new Error(data.error || 'Signup failed'); }
    window.location.href = '/';
  } catch (err) {
    showError(err.message);
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
}

// Check for URL error params
const params = new URLSearchParams(window.location.search);
if (params.get('error') === 'google_failed') {
  showError('Google sign-in failed. Please try again or use email.');
}
</script>
</body>
</html>
